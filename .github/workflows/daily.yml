name: 📰 Ingestion RSS quotidienne

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # augmenté car NLP prend du temps

    steps:
      - name: 📥 Checkout du repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Lancement de l'ingestion
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python ingest.py

      - name: 🧠 Extraction NLP (noms & entités)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python nlp.py

      - name: 📊 Statistiques de la base
        if: always()
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, duckdb
          con = duckdb.connect(f"md:?motherduck_token={os.environ['MOTHERDUCK_TOKEN']}")
          con.execute("USE news_intelligence")

          total   = con.execute("SELECT COUNT(*) FROM articles").fetchone()[0]
          today   = con.execute("SELECT COUNT(*) FROM articles WHERE DATE(publish_date) = CURRENT_DATE").fetchone()[0]
          words   = con.execute("SELECT COUNT(*) FROM article_words").fetchone()[0]

          print(f"📊 Total articles  : {total}")
          print(f"📅 Articles auj.   : {today}")
          print(f"🔤 Mots indexés    : {words:,}")

          print("\n🌍 Par langue (aujourd'hui) :")
          for row in con.execute("""
              SELECT language, COUNT(*)
              FROM articles
              WHERE DATE(publish_date) = CURRENT_DATE
              GROUP BY 1 ORDER BY 2 DESC
          """).fetchall():
              print(f"   {row[0]}: {row[1]}")

          print("\n🔝 Top 10 mots (toutes langues, 7 derniers jours) :")
          for row in con.execute("""
              SELECT w.word, COUNT(*) AS freq
              FROM article_words w
              JOIN articles a ON w.article_id = a.article_id
              WHERE a.publish_date >= CURRENT_DATE - INTERVAL 7 DAY
              GROUP BY 1 ORDER BY 2 DESC LIMIT 10
          """).fetchall():
              print(f"   {row[0]:<20} {row[1]:>6}")
          EOF