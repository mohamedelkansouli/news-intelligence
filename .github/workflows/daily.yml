name: 📰 Ingestion RSS quotidienne

on:
  # Toutes les 6 heures : 00h, 06h, 12h, 18h UTC
  schedule:
    - cron: '0 */6 * * *'
  
  # Permet de lancer manuellement depuis l'UI GitHub
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout du repo
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🚀 Lancement de l'ingestion
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python ingest.py
      
      - name: 📊 Statistiques de la base
        if: always()
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, duckdb
          con = duckdb.connect(f"md:?motherduck_token={os.environ['MOTHERDUCK_TOKEN']}")
          con.execute("USE news_intelligence")
          
          total = con.execute("SELECT COUNT(*) FROM articles").fetchone()[0]
          today = con.execute("SELECT COUNT(*) FROM articles WHERE DATE(publish_date) = CURRENT_DATE").fetchone()[0]
          
          print(f"📊 Total articles en base : {total}")
          print(f"📅 Articles d'aujourd'hui : {today}")
          
          print("\n🌍 Par langue (aujourd'hui) :")
          for row in con.execute("""
              SELECT language, COUNT(*) 
              FROM articles 
              WHERE DATE(publish_date) = CURRENT_DATE 
              GROUP BY 1 ORDER BY 2 DESC
          """).fetchall():
              print(f"   {row[0]}: {row[1]}")
          EOF
